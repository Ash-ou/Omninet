<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omninet SOC - Endpoints</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
  </head>
  <body data-page="endpoints">
    <header class="topbar">
      <div class="topbar-brand">Omninet SOC</div>
      <nav class="topbar-nav" aria-label="Navigation principale">
        <a href="/ui" data-nav="dashboard">Dashboard</a>
        <a href="/ui/alerts" data-nav="alerts">Alertes</a>
        <a href="/ui/events" data-nav="events">Événements</a>
        <a href="/ui/endpoints" data-nav="endpoints">Endpoints</a>
        <a href="/ui/scans" data-nav="scans">Scans</a>
      </nav>
    </header>

    <main class="layout">
      <section class="hero card">
        <h1>Inventaire des endpoints</h1>
        <p>Suivi des hôtes actifs, de leur état de télémétrie et de leurs dernières informations remontées.</p>
      </section>

      <section class="card">
        <h2>Authentification analyste</h2>
        <form id="login-form" class="form-grid">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn-primary">Se connecter</button>
        </form>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="loading-indicator" class="loading hidden" role="status" aria-live="polite">Chargement…</div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Liste des endpoints</h2>
          <button id="load-data" type="button" class="btn-secondary">Charger</button>
        </div>
        <div class="filters">
          <div class="field-inline">
            <label for="search-input">Recherche</label>
            <input id="search-input" type="text" class="search-input" placeholder="Rechercher un endpoint..." />
          </div>
          <div class="field-inline">
            <label for="sort-column">Trier par</label>
            <select id="sort-column"></select>
          </div>
          <div class="field-inline">
            <label for="sort-direction">Ordre</label>
            <select id="sort-direction">
              <option value="desc">Descendant</option>
              <option value="asc">Ascendant</option>
            </select>
          </div>
          <div class="field-inline">
            <label for="page-size">Par page</label>
            <select id="page-size">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>
        <div class="section-head">
          <div id="results-count" class="status" role="status" aria-live="polite">0 résultats</div>
          <div class="filters">
            <button id="prev-page" type="button" class="btn-secondary">Précédent</button>
            <span id="page-indicator" class="status" aria-live="polite">Page 1 / 1</span>
            <button id="next-page" type="button" class="btn-secondary">Suivant</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="results" class="data-table"></table>
        </div>
      </section>
    </main>

    <script src="/ui/assets/app.js"></script>
  </body>
</html>
