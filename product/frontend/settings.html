<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>

        </svg>
      </a>
      <a href="/ui/endpoints" class="sidebar-link" data-nav="endpoints">

        </svg>

      <div class="sidebar-separator"></div>
      <a href="/ui/settings" class="sidebar-link active" data-nav="settings" title="Paramètres">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />

    <div class="sidebar-footer">
      <div class="sidebar-user-avatar" id="sidebar-user-avatar">?</div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Paramètres</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-status">
          <span class="topbar-status-dot"></span>
          <span>SOC en ligne</span>
        </div>
        <button id="btn-login" class="btn btn-ghost auth-hide">Connexion</button>
        <button id="btn-logout" class="btn btn-ghost auth-show" style="display:none">Déconnexion</button>
      </div>
    </header>

    <div class="content">
      <!-- Profile Card -->
      <div class="glass" style="margin-bottom:20px">
        <div class="glass-header">
          <h2>Mon profil</h2>
        </div>
        <div class="glass-body">
          <div class="profile-info">
            <div class="profile-avatar" id="profile-avatar">?</div>
            <div class="profile-details">
              <div class="profile-row">
                <span class="profile-label">Utilisateur</span>
                <span class="profile-value" id="profile-username">—</span>
              </div>
              <div class="profile-row">
                <span class="profile-label">Rôle</span>
                <span class="profile-value"><span id="profile-role-badge"></span></span>
              </div>
              <div class="profile-row">
                <span class="profile-label">Session</span>
                <span class="profile-value" id="profile-session">—</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Admin: User Management -->
      <div id="admin-section" class="glass" style="margin-bottom:20px;display:none">
        <div class="glass-header">
          <h2>Gestion des utilisateurs</h2>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="user-count" style="font-size:0.82rem;color:var(--text-muted)"></span>
            <button id="load-users" class="btn btn-primary">Charger</button>
          </div>
        </div>
        <div class="glass-body">
          <div class="toolbar">
            <div class="toolbar-group">
              <label for="user-search">Recherche</label>
              <input id="user-search" type="text" placeholder="Nom d'utilisateur…" />
            </div>
            <button id="btn-create-user" class="btn btn-primary">+ Nouvel utilisateur</button>
          </div>
        </div>
      </div>

      <div id="admin-section-table" class="glass" style="display:none">
        <div class="glass-header">
          <h2>Utilisateurs</h2>
          <span id="results-count" style="font-size:0.82rem;color:var(--text-muted)">0 résultats</span>
        </div>
        <div class="glass-body">
          <div class="table-wrap">
            <table id="user-results" class="data-table"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit User Modal -->
  <div id="user-modal" class="modal-overlay">
    <div class="modal" style="position:relative">
      <button class="modal-close" onclick="closeUserModal()">&times;</button>
      <h2 id="user-modal-title">Nouvel utilisateur</h2>
      <form id="user-form" class="form-grid">
        <div class="field">
          <label for="user-form-username">Nom d'utilisateur</label>
          <input id="user-form-username" type="text" autocomplete="off" required placeholder="ex: analyste2" />
        </div>
        <div class="field">
          <label for="user-form-password">Mot de passe</label>
          <input id="user-form-password" type="password" autocomplete="new-password" required placeholder="Minimum 4 caractères" />
        </div>
        <div class="field">
          <label for="user-form-role">Rôle</label>
          <select id="user-form-role">
            <option value="analyst">Analyste</option>
            <option value="admin">Administrateur</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Enregistrer</button>
        <div id="user-form-status" style="font-size:0.82rem;color:var(--text-muted);text-align:center;min-height:1.5em"></div>
      </form>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal-overlay">
    <div class="modal" style="position:relative">
      <button class="modal-close" onclick="closeLoginModal()">&times;</button>
      <h2>Connexion SOC</h2>
      <p>Authentifiez-vous pour accéder aux paramètres</p>
      <form id="modal-login-form" class="form-grid">
        <div class="field">
          <label for="modal-username">Identifiant</label>
          <input id="modal-username" type="text" autocomplete="username" required placeholder="admin ou analyst" />
        </div>
        <div class="field">
          <label for="modal-password">Mot de passe</label>
          <input id="modal-password" type="password" autocomplete="current-password" required placeholder="••••••" />
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Se connecter</button>
        <div id="modal-login-status" style="font-size:0.82rem;color:var(--text-muted);text-align:center;min-height:1.5em"></div>
      </form>
    </div>
  </div>

  <script src="/ui/assets/app.js"></script>
</body>
</html>
